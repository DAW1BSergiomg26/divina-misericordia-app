<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Divina Misericordia</title>
  <style>
    :root { --gold: #d8b45a; --bg: #080503; --text: #fff6dc; --panel: rgba(34, 19, 9, 0.84); }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "EB Garamond", serif;
      min-height: 100vh;
      padding: 1rem;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding:1rem;
      border-bottom: 1px solid rgba(216, 180, 90, 0.42);
      margin-bottom: 1rem;
    }
    h1 { color: var(--gold); font-family: "Cinzel Decorative", serif; }
    .logout { 
      padding:0.5rem 1rem;
      border: 1px solid var(--gold);
      border-radius: 999px;
      background: transparent;
      color: var(--gold);
      cursor: pointer;
    }
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      margin-bottom: 0.5rem;
      border: 1px solid rgba(216, 180, 90, 0.42);
      border-radius: 0.55rem;
      background: var(--panel);
      font-size: 0.9rem;
    }
    .toolbar {
      display: flex;
      gap:0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar button, .toolbar select, .toolbar input {
      padding:0.5rem 1rem;
      border: 1px solid rgba(216, 180, 90, 0.42);
      border-radius: 0.55rem;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }
    .toolbar input {
      flex: 1;
      min-width: 150px;
    }
    .toolbar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      height: calc(100vh - 250px);
    }
    .editor, .preview {
      border: 1px solid rgba(216, 180, 90, 0.42);
      border-radius: 22px;
      padding: 1rem;
      background: var(--panel);
      position: relative;
    }
    .editor.dirty::before {
      content: "●";
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      color: #ff6b6b;
      font-size: 1.2rem;
    }
    textarea {
      width:100%;
      height:100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: monospace;
      resize: none;
    }
    iframe { width:100%; height:100%; border: none; background: white; }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .auto-refresh {
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>✝ Panel de Administración</h1>
    <button class="logout" onclick="logout()">Cerrar Sesión</button>
  </header>

  <div class="info-bar">
    <span id="fileInfo">Ningún archivo</span>
    <span id="fileSize"></span>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Buscar página..." oninput="filterPages()">
    <select id="pageSelect" onchange="loadPage()">
      <option value="index.html">index.html</option>
    </select>
    <button id="btnSave" onclick="save()" disabled>Guardar</button>
    <button onclick="undo()">Deshacer</button>
    <button onclick="redo()">Rehacer</button>
    <button onclick="copy()">Copiar</button>
    <button onclick="download()">Descargar</button>
    <button onclick="preview()">Actualizar preview</button>
    <label class="auto-refresh">
      <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()"> Auto
    </label>
  </div>

  <div class="main">
    <div class="editor" id="editorContainer">
      <textarea id="editor" oninput="onEditorInput()"></textarea>
    </div>
    <div class="preview">
      <div class="preview-header">
        <span>Preview</span>
        <span id="lastModified"></span>
      </div>
      <iframe id="preview"></iframe>
    </div>
  </div>

  <script>
    fetch('/api/admin/session', { credentials: 'include' })
      .then(res => res.json())
      .then(data => { if (!data.logged) window.location.href = 'admin.html'; });

    let currentPage = null;
    let originalContent = '';
    let history = [];
    let historyIndex = -1;
    let autoRefreshInterval = null;
    let saveTimeout = null;

    const PAGES = ['index.html', 'test-admin-save.html', 'public/admin.html', 'public/admin-panel.html'];

    function filterPages() {
      const filter = document.getElementById('searchInput').value.toLowerCase();
      const select = document.getElementById('pageSelect');
      select.innerHTML = '';
      PAGES.filter(p => p.toLowerCase().includes(filter)).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        select.appendChild(opt);
      });
      if (select.options.length > 0) {
        select.value = select.options[0].value;
        loadPage();
      }
    }

    function loadPage() {
      const page = document.getElementById('pageSelect').value;
      if (!page) return;
      currentPage = page;
      fetch(page)
        .then(res => res.text())
        .then(html => {
          const editor = document.getElementById('editor');
          editor.value = html;
          originalContent = html;
          preview();
          addToHistory(html);
          updateFileInfo();
          clearDirty();
        });
    }

    function onEditorInput() {
      preview();
      if (autoRefreshInterval) {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(preview, 300);
      }
      checkDirty();
    }

    function preview() {
      const html = document.getElementById('editor').value;
      document.getElementById('preview').srcdoc = html;
    }

    function toggleAutoRefresh() {
      const isOn = document.getElementById('autoRefresh').checked;
      if (isOn) {
        autoRefreshInterval = setInterval(preview, 1000);
      } else {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
      }
    }

    function updateFileInfo() {
      const editor = document.getElementById('editor');
      const size = new Blob([editor.value]).size;
      document.getElementById('fileInfo').textContent = `Archivo: ${currentPage}`;
      document.getElementById('fileSize').textContent = `${(size / 1024).toFixed(2)} KB`;
      if (currentPage) {
        document.getElementById('lastModified').textContent = `Cargado: ${new Date().toLocaleTimeString()}`;
      }
    }

    function addToHistory(html) {
      if (historyIndex < history.length - 1) {
        history = history.slice(0, historyIndex + 1);
      }
      if (history.length >= 20) history.shift();
      history.push(html);
      historyIndex = history.length - 1;
    }

    function undo() {
      if (historyIndex <= 0) return;
      historyIndex--;
      document.getElementById('editor').value = history[historyIndex];
      preview();
      checkDirty();
    }

    function redo() {
      if (historyIndex >= history.length - 1) return;
      historyIndex++;
      document.getElementById('editor').value = history[historyIndex];
      preview();
      checkDirty();
    }

    function checkDirty() {
      const editor = document.getElementById('editor');
      const container = document.getElementById('editorContainer');
      const btnSave = document.getElementById('btnSave');
      const isDirty = editor.value !== originalContent;
      container.classList.toggle('dirty', isDirty);
      btnSave.disabled = !isDirty;
    }

    function clearDirty() {
      document.getElementById('editorContainer').classList.remove('dirty');
      document.getElementById('btnSave').disabled = true;
    }

    function copy() {
      navigator.clipboard.writeText(document.getElementById('editor').value);
    }

    function download() {
      if (!currentPage) return;
      const blob = new Blob([document.getElementById('editor').value], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = currentPage;
      a.click();
      URL.revokeObjectURL(url);
    }

    function save() {
      if (!currentPage) { alert('Selecciona una página'); return; }
      const btnSave = document.getElementById('btnSave');
      btnSave.disabled = true;
      fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ page: currentPage, content: document.getElementById('editor').value })
      })
        .then(res => res.ok ? alert('Guardado') : alert('Error: Backend requerido'))
        .catch(() => alert('Error: Backend no disponible'))
        .finally(() => {
          originalContent = document.getElementById('editor').value;
          clearDirty();
        });
    }

    function logout() {
      fetch('/api/admin/logout', { method: 'POST', credentials: 'include' })
        .then(() => window.location.href = 'admin.html');
    }

    window.addEventListener('beforeunload', (e) => {
      if (document.getElementById('editor').value !== originalContent) {
        e.preventDefault();
        e.returnValue = 'Hay cambios sin guardar. ¿Seguro que quieres salir?';
      }
    });

    filterPages();
  </script>
</body>
</html>
