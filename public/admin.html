<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Divina Misericordia</title>
  <style>
    :root { --gold: #d8b45a; --bg: #080503; --text: #fff6dc; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "EB Garamond", serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .login-box {
      border: 1px solid rgba(216, 180, 90, 0.42);
      border-radius: 22px;
      padding: 2rem;
      background: linear-gradient(180deg, rgba(68, 39, 18, 0.86), rgba(18, 10, 5, 0.82));
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.52);
      width: min(400px, 90vw);
      text-align: center;
    }
    h1 { color: var(--gold); font-family: "Cinzel Decorative", serif; margin-bottom: 1.5rem; }
    input {
      width: 100%;
      padding: 0.7rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(216, 180, 90, 0.42);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font: inherit;
    }
    button {
      width: 100%;
      padding: 0.7rem;
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe6a2, #cfa64d);
      color: #2a1b10;
      font: inherit;
      cursor: pointer;
    }
    .error { color: #ff5555; margin-top: 1rem; display: none; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-box">
    <h1>✝ Admin Login</h1>
    <input type="text" id="user" placeholder="Usuario" value="sacra">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Iniciar Sesión</button>
    <div class="error" id="error">Credenciales inválidas</div>
  </div>

  <script>
    if (localStorage.adminLogged === 'true') window.location.href = 'admin-panel.html';

    function login() {
      const user = document.getElementById('user').value;
      const pass = document.getElementById('pass').value;
      if (user === 'sacra' && pass === 'Rufi14') {
        localStorage.adminLogged = 'true';
        window.location.href = 'admin-panel.html';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }
  </script>
</body>
</html>
